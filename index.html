    <style>
        :root {
            --navy: #0d1b2a; --navy2: #1a2d42; --accent: #f4a261; --teal: #2ec4b6;
            --white: #f8f9fa; --gray: #8899aa; --border: rgba(255,255,255,0.1);
            --glass: rgba(255,255,255,0.05); --red: #ef476f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sarabun', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: 'Sarabun'; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-ghost { background: var(--glass); color: var(--white); border: 1px solid var(--border); }

        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .card-label { color: var(--gray); font-size: 0.85rem; margin-bottom: 5px; }
        .card-value { font-family: 'IBM Plex Mono'; font-size: 1.8rem; font-weight: 600; color: var(--accent); }

        /* Table & Layout */
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .panel-title { margin-bottom: 15px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
